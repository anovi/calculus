<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        var key = 'calculus-theme';
        var theme = null;
        try {
          theme = localStorage.getItem(key);
        } catch (e) {}
        if (theme !== 'light' && theme !== 'dark') {
          theme = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        }
        document.documentElement.dataset.theme = theme;
      })();
    </script>
    <script>
      window.__calculusDeferredInstallPrompt = null;
      window.addEventListener('beforeinstallprompt', function (event) {
        event.preventDefault();
        window.__calculusDeferredInstallPrompt = event;
      });
      window.addEventListener('appinstalled', function () {
        window.__calculusDeferredInstallPrompt = null;
      });
    </script>
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" href="/favicon.svg" sizes="any" type="image/svg+xml" />
    <link rel="stylesheet" href="/src/assets/normalize.css" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, interactive-widget=resizes-content, user-scalable=no">
    <meta name="theme-color" content="#151C20" />
    <meta name="description" content="Calculus: a tiny notebook editor for everyday math." />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
    <title>Calculus</title>
  </head>
  <body>
    <div id="app-shell">
      <aside id="documents-drawer" aria-hidden="true">
        <!-- <header class="documents-drawer__header">
          <h2>Documents</h2>
        </header> -->
        <ul id="documents-list"></ul>
      </aside>
      <div id="documents-backdrop" aria-hidden="true"></div>
      <div id="editor"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
