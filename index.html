<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        var key = 'calculus-theme';
        var theme = null;
        try {
          theme = localStorage.getItem(key);
        } catch (e) {}
        if (theme !== 'light' && theme !== 'dark') {
          theme = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        }
        document.documentElement.dataset.theme = theme;
      })();
    </script>
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" href="/favicon.svg" sizes="any" type="image/svg+xml" />
    <link rel="stylesheet" href="/src/assets/normalize.css" />
    <link rel="stylesheet" href="/src/editor.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, interactive-widget=resizes-content, user-scalable=no">
    <meta name="theme-color" content="#151C20" />
    <meta name="description" content="Calculus: a tiny notebook editor for everyday math." />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
    <title>Calculus</title>
  </head>
  <body>
    <div id="app-shell">
      <aside id="documents-drawer" aria-hidden="true">
        <!-- <header class="documents-drawer__header">
          <h2>Documents</h2>
        </header> -->
        <ul id="documents-list"></ul>
      </aside>
      <div id="documents-backdrop" aria-hidden="true"></div>
      <div id="editor"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
