<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        var key = 'compio-theme';
        var theme = null;
        try {
          theme = localStorage.getItem(key);
        } catch (e) {}
        if (theme !== 'light' && theme !== 'dark') {
          theme = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        }
        document.documentElement.dataset.theme = theme;
      })();
    </script>
    <script>
      window.__compioDeferredInstallPrompt = null;
      window.addEventListener('beforeinstallprompt', function (event) {
        event.preventDefault();
        window.__compioDeferredInstallPrompt = event;
      });
      window.addEventListener('appinstalled', function () {
        window.__compioDeferredInstallPrompt = null;
      });
    </script>
    <link rel="icon" href="./favicon.ico" sizes="48x48" />
    <link rel="icon" href="./favicon.svg" sizes="any" type="image/svg+xml" />
    <link rel="stylesheet" href="/src/assets/normalize.css" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, interactive-widget=resizes-content, user-scalable=no">
    <meta name="theme-color" content="#151C20" />
    <meta name="description" content="Write math line by line, assign variables, convert units and currencies, and see results update instantly — works offline when installed" />

    <div id="app-shell">

    <template id="install-pwa-dialog-template">

        <button id="install-pwa-close" class="primary install-pwa-close">Close</button>

    <template id="install-pwa-sheet-template">
      <div class="install-pwa-sheet">
        <button id="pwa-install-link" class="pwa-install-link">Install as app for better experience</button> 
        <button id="install-pwa-sheet-close" class="install-pwa-sheet-close">
          <img src="/icons/xmark.svg">
